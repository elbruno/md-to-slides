name: Deck Builder

permissions:
  contents: write
  issues: write

# Trigger on push or pull requests that modify .md files
on:
  push:
    paths:
      - '**.md'
  pull_request:
    paths:
      - '**.md'

jobs:
  generate-decks:
    name: Generate Presentation Decks
    runs-on: ubuntu-latest
    
    steps:
      # Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install Node.js if needed for validation
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install the presentation-skill
      - name: Install presentation-skill
        env:
          SKILL_DIR: ${{ runner.temp }}/presentation-skill
        run: |
          rm -rf "$SKILL_DIR"
          mkdir -p "$SKILL_DIR"
          cp -R skill templates examples "$SKILL_DIR/"
          echo "PRESENTATION_SKILL_DIR=$SKILL_DIR" >> "$GITHUB_ENV"

          # Verify installation
          find "$SKILL_DIR" -maxdepth 2 -type f | sort

      # Detect markdown files that may need processing
      - name: Detect markdown files
        id: detect
        run: |
          # Find all markdown files in the repo (excluding this workflow)
          md_files=$(find . -name "*.md" -type f ! -path "./.github/*" ! -path "./node_modules/*" ! -path "./.copilot/*" | head -10)
          echo "markdown_files<<EOF" >> $GITHUB_OUTPUT
          echo "$md_files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          if [ -z "$md_files" ]; then
            echo "No markdown files found for deck generation"
          else
            echo "Found markdown files:"
            echo "$md_files"
          fi

      # Note: Deck generation happens via your AI agent (GitHub Copilot / Claude Code)
      # This workflow template provides the foundation for CI/CD integration.
      # When your agent creates slides.html files, this workflow can:
      # 1. Validate the output (checking for required HTML elements)
      # 2. Commit generated slides back to the repo
      # 3. Comment on the PR with a link to the deck
      
      # Example: Validate generated HTML files (if they exist)
      - name: Validate generated decks
        if: always()
        run: |
          # Look for any slides.html files that were generated
          if find . -name "slides.html" -type f ! -path "./.copilot/*" ! -path "./node_modules/*" | grep -q .; then
            echo "✅ Generated HTML files found"
            find . -name "slides.html" -type f ! -path "./.copilot/*" ! -path "./node_modules/*" | xargs ls -lh
          else
            echo "ℹ️  No generated HTML files found - agent will create them when invoked"
          fi

      # Optional: Commit generated slides if this is a push (not a PR)
      - name: Commit generated decks
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          mapfile -t generated_files < <(git ls-files -m -o --exclude-standard -- ':(glob)**/slides.html' ':(exclude).copilot/**' ':(exclude)node_modules/**')

          if [ "${#generated_files[@]}" -eq 0 ]; then
            echo "No generated decks to commit"
            exit 0
          fi

          echo "Deck files queued for commit:"
          printf '%s\n' "${generated_files[@]}"

          git add -- "${generated_files[@]}"

          if git diff --cached --quiet; then
            echo "No meaningful deck changes to commit"
            exit 0
          fi

          git commit -m "docs: auto-generated presentation decks [skip ci]"
          git push

      # Optional: Comment on PR with deck links
      - name: Comment on PR with deck links
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            // This example shows how to comment on a PR with generated deck links
            // Customize based on your actual deck output locations
            const fs = require('fs');
            const path = require('path');
            
            // Find all slides.html files
            const { execSync } = require('child_process');
            const files = execSync('find . -name "slides.html" -type f ! -path "./.copilot/*" ! -path "./node_modules/*" 2>/dev/null')
              .toString()
              .trim()
              .split('\n')
              .filter(f => f.length > 0);
            
            if (files.length === 0) {
              console.log('No generated decks to report');
              return;
            }
            
            // Build comment with deck links
            let comment = '## 🎉 Generated Presentation Decks\n\n';
            files.forEach(file => {
              const name = path.basename(path.dirname(file));
              comment += `- [${name}](${file})\n`;
            });
            
            // Post comment to PR if we have an API token
            try {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (e) {
              console.log('Could not post comment:', e.message);
            }
